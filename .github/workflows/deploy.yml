name: build-and-deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute lowercase image prefix
        id: image_prefix
        shell: bash
        run: |
          repo_lc="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "value=ghcr.io/${repo_lc}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image_prefix.outputs.value }}-api:latest
            ${{ steps.image_prefix.outputs.value }}-api:${{ github.sha }}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ${{ steps.image_prefix.outputs.value }}-web:latest
            ${{ steps.image_prefix.outputs.value }}-web:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-images

    steps:
      - name: Pull-and-run on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script_stop: true
          script: |
            set -e

            APP_DIR="${{ secrets.SERVER_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="$HOME/email-verifier-api"
            fi

            REPO_URL="https://github.com/${{ github.repository }}.git"
            AUTH_B64="$(printf 'x-access-token:%s' '${{ github.token }}' | base64 | tr -d '\n')"
            GIT_AUTH_HEADER="AUTHORIZATION: basic ${AUTH_B64}"

            if [ ! -d "$APP_DIR/.git" ]; then
              git -c "http.https://github.com/.extraheader=$GIT_AUTH_HEADER" clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git -c "http.https://github.com/.extraheader=$GIT_AUTH_HEADER" fetch origin main
            git checkout main
            git -c "http.https://github.com/.extraheader=$GIT_AUTH_HEADER" pull --ff-only origin main

            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            repo_lc="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
            export GHCR_IMAGE_PREFIX="ghcr.io/${repo_lc}"

            docker compose --env-file .env -f deploy/docker-compose.prod.yml pull
            docker compose --env-file .env -f deploy/docker-compose.prod.yml up -d
            docker image prune -f
