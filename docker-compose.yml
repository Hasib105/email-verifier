services:
  tor:
    build:
      context: .
      dockerfile: tor.Dockerfile
    networks:
      - verifier-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9050 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - API_KEY=super-secret-key-123
      - TOR_SOCKS_ADDR=tor:9050
      - MAX_CONCURRENCY=5
    depends_on:
      tor:
        condition: service_healthy
    networks:
      - verifier-net
    restart: unless-stopped

networks:
  verifier-net:
    driver: bridge