services:
  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-verifier}
      - DB_PORT=${DB_PORT:-15432}
    command: ["postgres", "-p", "${DB_PORT:-15432}"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p $$DB_PORT -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - verifier-net
    restart: unless-stopped

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - API_KEY=super-secret-key-123
      - MAX_CONCURRENCY=5
      - TIMEOUT=20s
      - VERIFIER_MAIL_FROM=verify@localhost
      - VERIFIER_EHLO_DOMAIN=localhost
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-15432}
      - DB_USER=${DB_USER:-${POSTGRES_USER:-postgres}}
      - DB_PASSWORD=${DB_PASSWORD:-${POSTGRES_PASSWORD:-postgres}}
      - DB_NAME=${DB_NAME:-${POSTGRES_DB:-verifier}}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      - DATABASE_DSN=${DATABASE_DSN:-}
      - WEBHOOK_URL=
      - WEBHOOK_TIMEOUT=10s
      - CHECK_INTERVAL=1m
      - FIRST_BOUNCE_DELAY=1m
      - SECOND_BOUNCE_DELAY=6h
      - HARD_RESULT_TTL=168h
      - DIRECT_VALID_TTL=72h
      - PROBE_VALID_TTL=24h
      - TRANSIENT_RESULT_TTL=6h
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - verifier-net
    restart: unless-stopped

  web:
    build: 
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - verifier-net
    restart: unless-stopped

networks:
  verifier-net:
    driver: bridge

volumes:
  postgres-data:
