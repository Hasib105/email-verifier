services:
  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-verifier}
      - DB_PORT=${DB_PORT:-15432}
    command: ["postgres", "-p", "${DB_PORT:-15432}"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p $$DB_PORT -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - verifier-net
    restart: unless-stopped

  api:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/hasib105/email-verifier}-api:latest
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MAX_CONCURRENCY=${MAX_CONCURRENCY:-10}
      - TIMEOUT=${TIMEOUT:-20s}
      - VERIFIER_MAIL_FROM=${VERIFIER_MAIL_FROM:-verify@verifier.local}
      - VERIFIER_EHLO_DOMAIN=${VERIFIER_EHLO_DOMAIN:-verifier.local}
      - DELIVERABLE_TTL=${DELIVERABLE_TTL:-168h}
      - UNDELIVERABLE_TTL=${UNDELIVERABLE_TTL:-24h}
      - ACCEPT_ALL_TTL=${ACCEPT_ALL_TTL:-24h}
      - UNKNOWN_TTL=${UNKNOWN_TTL:-6h}
      - DOMAIN_BASELINE_TTL=${DOMAIN_BASELINE_TTL:-24h}
      - ENRICHMENT_WORKERS=${ENRICHMENT_WORKERS:-2}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-15432}
      - DB_USER=${DB_USER:-${POSTGRES_USER:-postgres}}
      - DB_PASSWORD=${DB_PASSWORD:-${POSTGRES_PASSWORD:-postgres}}
      - DB_NAME=${DB_NAME:-${POSTGRES_DB:-verifier}}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      - DATABASE_DSN=${DATABASE_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - verifier-net
    restart: unless-stopped

  web:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/hasib105/email-verifier}-web:latest
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api
    networks:
      - verifier-net
    restart: unless-stopped

networks:
  verifier-net:
    driver: bridge

volumes:
  postgres-data:
