services:
  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-verifier}
      - DB_PORT=${DB_PORT:-15432}
    command: ["postgres", "-p", "${DB_PORT:-15432}"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p $$DB_PORT -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - verifier-net
    restart: unless-stopped

  tor:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/hasib105/email-verifier}-tor:latest
    networks:
      - verifier-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9050 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/hasib105/email-verifier}-api:latest
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - API_KEY=${API_KEY}
      - TOR_SOCKS_ADDR=tor:9050
      - MAX_CONCURRENCY=${MAX_CONCURRENCY:-5}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-15432}
      - DB_USER=${DB_USER:-${POSTGRES_USER:-postgres}}
      - DB_PASSWORD=${DB_PASSWORD:-${POSTGRES_PASSWORD:-postgres}}
      - DB_NAME=${DB_NAME:-${POSTGRES_DB:-verifier}}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      - DATABASE_DSN=${DATABASE_DSN:-}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - WEBHOOK_TIMEOUT=${WEBHOOK_TIMEOUT:-10s}
      - CHECK_INTERVAL=${CHECK_INTERVAL:-1m}
      - FIRST_BOUNCE_DELAY=${FIRST_BOUNCE_DELAY:-1m}
      - SECOND_BOUNCE_DELAY=${SECOND_BOUNCE_DELAY:-6h}
    depends_on:
      postgres:
        condition: service_healthy
      tor:
        condition: service_healthy
    networks:
      - verifier-net
    restart: unless-stopped

  web:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/hasib105/email-verifier}-web:latest
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api
    networks:
      - verifier-net
    restart: unless-stopped

networks:
  verifier-net:
    driver: bridge

volumes:
  postgres-data:
